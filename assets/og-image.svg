<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06080F"/>
      <stop offset="100%" stop-color="#141C30"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E0C7"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0" r="0.8">
      <stop offset="0%" stop-color="rgba(0,224,199,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,224,199,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.1" r="0.7">
      <stop offset="0%" stop-color="rgba(139,92,246,0.16)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- grid -->
  <g stroke="rgba(120,150,210,0.08)" stroke-width="1">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200"/>
    <path d="M120 0 V630 M280 0 V630 M440 0 V630 M600 0 V630 M760 0 V630 M920 0 V630 M1080 0 V630"/>
  </g>

  <!-- mark -->
  <g transform="translate(80, 220)">
    <rect width="80" height="80" rx="18" fill="url(#gr)"/>
    <text x="40" y="55" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="800" font-size="32" fill="#06080F">DP</text>
  </g>

  <!-- title -->
  <g font-family="Inter, system-ui, sans-serif" fill="#E8ECF5">
    <text x="190" y="260" font-weight="800" font-size="78" letter-spacing="-2">Never miss the next</text>
    <text x="190" y="350" font-weight="900" font-size="78" letter-spacing="-2" fill="url(#gr)">mint window.</text>
    <text x="190" y="410" font-weight="500" font-size="26" fill="#A8B0C2">DropPilot AI · co-pilot for drop hunters</text>
    <text x="190" y="445" font-weight="500" font-size="22" fill="#5C657A">Multi-chain mint tracking · gas oracle · wallet eligibility · risk scoring</text>
  </g>

  <!-- meta strip -->
  <g font-family="JetBrains Mono, monospace" fill="#5C657A" font-size="18">
    <text x="80" y="565">[ETH · BASE · MONAD · ABSTRACT · ZORA · SOLANA · OPENSEA · MAGIC EDEN]</text>
  </g>

  <!-- live dot -->
  <g transform="translate(1080, 80)">
    <circle r="6" fill="#34D399"/>
    <text x="16" y="5" font-family="JetBrains Mono, monospace" font-size="14" fill="#34D399" font-weight="700">LIVE</text>
  </g>
</svg>
